# docker-compose.yml
version: '3.8'

services:
  # Servicio de la base de datos MongoDB
  mongo:
    image: mongo:7.0
    container_name: gaugram_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=gaugram
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - gaugram-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/gaugram --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Servicio del Backend (API)
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: gaugram_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/gaugram
      - JWT_SECRET=gaugram-super-secret-jwt-key-docker-2025
      - CORS_ORIGIN=http://localhost:4200
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./api/uploads:/usr/src/app/uploads
      - ./api/logs:/usr/src/app/logs
    networks:
      - gaugram-network

  # Servicio del Frontend
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gaugram_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - gaugram-network

# Redes
networks:
  gaugram-network:
    driver: bridge

# Volúmenes
volumes:
  mongo-data:
    driver: local
